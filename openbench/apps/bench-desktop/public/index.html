<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenBench Bench Runtime — Loading…</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: grid; place-items: center; height: 100vh; }
      .card { text-align: center; padding: 24px; }
      .spinner { width: 28px; height: 28px; border: 3px solid #334155; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      a { color: #818cf8; }
    </style>
    <script>
      // Redirect to the running web app at startup
      window.location.replace("http://localhost:3000/app");
    </script>
  </head>
  <body>
    <div class="card">
      <div class="spinner"></div>
      <div><strong>OpenBench Bench Runtime</strong></div>
      <div style="font-size: 12px; opacity: 0.7; margin-top: 8px;">Loading the bench UI…</div>
      <div style="font-size: 12px; opacity: 0.7; margin-top: 16px;">If this doesn't redirect, ensure the API + web stack is running and visit <a href="http://localhost:3000/app">localhost:3000/app</a>.</div>
    </div>
  </body>
</html>
