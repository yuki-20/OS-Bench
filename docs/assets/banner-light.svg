<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <defs>
    <linearGradient id="bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="50%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="180" rx="16" fill="url(#bg-light)" />

  <!-- Accent bar -->
  <rect y="0" width="720" height="4" rx="2" fill="url(#accent-light)" />

  <!-- Flask icon -->
  <g transform="translate(80, 50)">
    <!-- Flask body -->
    <path d="M25 10 L25 55 L5 90 Q2 96 8 96 L62 96 Q68 96 65 90 L45 55 L45 10 Z"
          fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Flask top -->
    <line x1="18" y1="10" x2="52" y2="10" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <!-- Liquid -->
    <path d="M12 75 L58 75 L65 90 Q68 96 62 96 L8 96 Q2 96 5 90 Z" fill="#7C3AED" opacity="0.15"/>
    <!-- Bubbles -->
    <circle cx="30" cy="80" r="3" fill="#7C3AED" opacity="0.3"/>
    <circle cx="42" cy="72" r="2" fill="#3B82F6" opacity="0.3"/>
    <circle cx="35" cy="68" r="2.5" fill="#06B6D4" opacity="0.3"/>
    <!-- Level line -->
    <line x1="12" y1="55" x2="58" y2="55" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="195" y="80" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1e293b">
    Open<tspan fill="#7C3AED">Bench</tspan> OS
  </text>

  <!-- Subtitle -->
  <text x="195" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#64748b">
    The Protocol Runtime Platform for Physical Labs
  </text>

  <!-- Tech pills -->
  <g transform="translate(195, 130)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#7C3AED" opacity="0.1"/>
    <text x="30" y="15" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#7C3AED" text-anchor="middle">Opus 4.7</text>

    <rect x="68" y="0" width="55" height="22" rx="11" fill="#3B82F6" opacity="0.1"/>
    <text x="95" y="15" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#3B82F6" text-anchor="middle">Next.js</text>

    <rect x="131" y="0" width="55" height="22" rx="11" fill="#06B6D4" opacity="0.1"/>
    <text x="158" y="15" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#06B6D4" text-anchor="middle">Tauri 2</text>

    <rect x="194" y="0" width="55" height="22" rx="11" fill="#10B981" opacity="0.1"/>
    <text x="221" y="15" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#10B981" text-anchor="middle">FastAPI</text>

    <rect x="257" y="0" width="72" height="22" rx="11" fill="#F59E0B" opacity="0.1"/>
    <text x="293" y="15" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#D97706" text-anchor="middle">PostgreSQL</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="640" cy="45" r="25" fill="#7C3AED" opacity="0.06"/>
  <circle cx="670" cy="80" r="18" fill="#3B82F6" opacity="0.06"/>
  <circle cx="630" cy="110" r="12" fill="#06B6D4" opacity="0.06"/>
  <circle cx="680" cy="130" r="20" fill="#10B981" opacity="0.06"/>
</svg>
